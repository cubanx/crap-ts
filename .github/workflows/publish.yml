name: Publish

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Check package version change
        id: version
        shell: bash
        run: |
          set -euo pipefail

          old_version="$(git show "${{ github.event.before }}:package.json" | node -e 'let data = ""; process.stdin.on("data", (chunk) => data += chunk); process.stdin.on("end", () => console.log(JSON.parse(data).version));')"
          new_version="$(node -p 'require("./package.json").version')"

          if [ "$old_version" = "$new_version" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - run: npm ci
        if: steps.version.outputs.changed == 'true'

      - run: npm run lint
        if: steps.version.outputs.changed == 'true'

      - run: npm run check
        if: steps.version.outputs.changed == 'true'

      - run: npm test
        if: steps.version.outputs.changed == 'true'

      - run: npm run validate
        if: steps.version.outputs.changed == 'true'

      - run: npm publish --provenance
        if: steps.version.outputs.changed == 'true'
